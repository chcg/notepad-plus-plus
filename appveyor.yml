version: 1.0.{build}
image: Visual Studio 2015


clone_depth: 1

environment:
  matrix:
  #- PlatformToolset: v140_xp
  #- PlatformToolset: v120_xp
  - PlatformToolset: mingw-w64


platform:
    #- x64
    - Win32

configuration:
    #- Unicode Release
    - Unicode Debug

install:
    - if "%platform%"=="x64" set archi=amd64
    - if "%platform%"=="Win32" set archi=x86
    - call "C:\Program Files (x86)\Microsoft Visual Studio 14.0\VC\vcvarsall.bat" %archi%

    - ps: |
        if ($env:PLATFORMTOOLSET -match "mingw-w64") {
          $env:Path += ";C:\mingw-w64\i686-5.3.0-posix-dwarf-rt_v4-rev0\mingw32\bin"
          $env:Path = $env:Path.Replace('C:\Program Files\Git\usr\bin;','')
          g++ --version
          mingw32-make --version
        }

build:
    verbosity: minimal

build_script:
    - cd c:\projects\notepad-plus-plus\scintilla\win32
    - if "%configuration%"=="Unicode Debug" set scintilla_debug=DEBUG=1
    - if "%configuration%"=="Unicode Release" set scintilla_debug=
    - mingw32-make
    - cd c:\projects\notepad-plus-plus\PowerEditor\gcc\
    - mingw32-make

